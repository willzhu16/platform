name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing vX.Y.Z tag to rebuild the artifact for
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    uses: willzhu16/platform/.github/workflows/release.yml@v1
    with:
      tag: ${{ inputs.tag || '' }}
      language: python
