# SOPS encryption rules (spec 06). Files under secrets/ are encrypted to the shared age
# key before they are committed — safe to keep in a public repo.
#
# TODO (bootstrap, spec 06): replace the placeholder recipient below with the real age
# public key from platform/security/age.pub. Until then, do NOT commit anything under
# secrets/ — the gitleaks gate will catch an unencrypted secrets/*.env anyway.
creation_rules:
  - path_regex: secrets/.*\.(env|json|yaml)$
    age: age1PLACEHOLDER0000000000000000000000000000000000000000000000000000
