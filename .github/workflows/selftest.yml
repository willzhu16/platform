name: selftest

# Gates changes to the reusable workflows with the workflows themselves (spec 01 §6.4).
# On any platform PR that touches a workflow, a template, or a fixture: lint EVERY
# workflow with actionlint (so a new reusable workflow can never ship ungated —
# release.yml and preview.yml once did), run ci.yml / ci-python.yml against their
# minimal fixtures via LOCAL references, and render both copier templates and run the
# rendered projects' own gates (the fixtures do NOT cover templates). If a required
# check name is renamed, or the pipeline breaks, this goes red — the interface-freeze
# tripwire (acceptance test 6).

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'selftest-fixture/**'
      - 'selftest-fixture-py/**'
      - 'templates/**'
      - 'copier.yml'
      - 'scripts/**'
      - 'security/**'

permissions:
  contents: read

jobs:
  lint-workflows:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: actionlint (syntax + expression + shellcheck for all workflows)
        # False-positive suppressions live in .github/actionlint.yml — the docker
        # action splits `args` on whitespace, so quoted -ignore patterns can't be
        # passed here.
        uses: docker://rhysd/actionlint:1.7.7
        with:
          args: -color

  # scripts/ had no gate at all until the canary drill's fix PR itself shipped without
  # checks. Gate at warning severity: real problems fail, style notes don't.
  lint-scripts:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: docker://koalaman/shellcheck:v0.11.0
        with:
          args: --severity=warning scripts/new-project.sh scripts/setup-machine.sh

  # security/semgrep/ had no gate: a rule that silently stops matching produces a green
  # scan indistinguishable from a clean one (artemis-js-child-process-exec missed every
  # "node:"-prefixed import this way). `semgrep --test` runs the annotated fixture next to
  # each rule file; rule files without a fixture are skipped, not failed.
  test-semgrep-rules:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SEMGREP_VERSION: '1.168.0' # mirrors the pin in security.yml — keep in sync
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install semgrep (OSS engine)
        run: pip install "semgrep==${SEMGREP_VERSION}"
      - name: Test the shared rules against their fixtures
        run: semgrep --test --metrics=off security/semgrep

  ci:
    uses: ./.github/workflows/ci.yml
    with:
      working-directory: selftest-fixture

  # enforce-conventional-commits is left to the ci job above so commitlint runs once.
  ci-python:
    uses: ./.github/workflows/ci-python.yml
    with:
      working-directory: selftest-fixture-py
      enforce-conventional-commits: false

  # Render each template with every feature ON and run the rendered project's own
  # gates. This is what catches a template bug (bad jinja, broken wrangler config,
  # failing generated test) before a real project is generated from it.
  render-cf-worker-app:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # copier renders from the git HEAD, not the working tree
      - uses: astral-sh/setup-uv@v6
      - name: Render the template (all features on)
        run: |
          cat > "$RUNNER_TEMP/answers.yml" <<'EOF'
          template: cf-worker-app
          project_name: render-check
          description: selftest render of cf-worker-app
          visibility: public
          bindings: [kv, d1, r2, queues]
          needs_scheduled_jobs: true
          public_forms: true
          EOF
          uvx --from copier copier copy --defaults --vcs-ref HEAD \
            --data-file "$RUNNER_TEMP/answers.yml" . render-out
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: render-out/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run the rendered project's gates
        working-directory: render-out
        # No lockfile ships in the template (new-project.sh generates it), so this
        # install is deliberately un-frozen. `pnpm build` is wrangler's dry-run
        # deploy — it validates the rendered wrangler.jsonc and bundles the Worker.
        run: |
          pnpm install
          pnpm typecheck
          pnpm test
          pnpm build

  render-py-tool:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # copier renders from the git HEAD, not the working tree
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.13'
      - name: Render the template
        run: |
          cat > "$RUNNER_TEMP/answers.yml" <<'EOF'
          template: py-tool
          project_name: render-check-py
          description: selftest render of py-tool
          visibility: public
          EOF
          uvx --from copier copier copy --defaults --vcs-ref HEAD \
            --data-file "$RUNNER_TEMP/answers.yml" . render-out
      - name: Run the rendered project's gates
        working-directory: render-out
        run: |
          uv sync
          uv run ruff check .
          uv run ruff format --check .
          uv run pyright
          uv run pytest -q
