name: selftest

# Gates changes to the reusable workflows with the workflows themselves (spec 01 §6.4).
# On any platform PR that touches a workflow or a fixture: lint EVERY workflow with
# actionlint (so a new reusable workflow can never ship ungated — release.yml and
# preview.yml once did), and run ci.yml / ci-python.yml against their minimal fixtures
# via LOCAL references. If a required check name is renamed, or the pipeline breaks,
# this goes red — the interface-freeze tripwire (acceptance test 6). The fixtures double
# as the living example of the script contract.

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'selftest-fixture/**'
      - 'selftest-fixture-py/**'

permissions:
  contents: read

jobs:
  lint-workflows:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: actionlint (syntax + expression + shellcheck for all workflows)
        # False-positive suppressions live in .github/actionlint.yml — the docker
        # action splits `args` on whitespace, so quoted -ignore patterns can't be
        # passed here.
        uses: docker://rhysd/actionlint:1.7.7
        with:
          args: -color

  ci:
    uses: ./.github/workflows/ci.yml
    with:
      working-directory: selftest-fixture

  # enforce-conventional-commits is left to the ci job above so commitlint runs once.
  ci-python:
    uses: ./.github/workflows/ci-python.yml
    with:
      working-directory: selftest-fixture-py
      enforce-conventional-commits: false
