name: release-platform

# release-please for platform itself (spec 01 §6.2, D-14/D-18). On every push to main it
# maintains a running "chore: release vX.Y.Z" PR from Conventional Commits; merging that
# PR (a human-only action) tags vX.Y.Z and cuts a GitHub Release with a changelog. The
# published release then triggers update-major-tag.yml, which moves the `v1` tag that
# consumers pin to.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
