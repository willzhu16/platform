name: release-platform

# release-please for platform itself (spec 01 §6.2, D-14/D-18). On every push to main it
# maintains a running "chore: release vX.Y.Z" PR from Conventional Commits; merging that
# PR (a human-only action) tags vX.Y.Z and cuts a GitHub Release with a changelog. This
# workflow then dispatches update-major-tag.yml, which moves the `v1` tag consumers pin.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  actions: write # the handover step dispatches update-major-tag.yml

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - name: Move the v1 tag consumers pin
        # Releases cut with GITHUB_TOKEN never fire `release: published` workflows
        # (GitHub suppresses GITHUB_TOKEN-created events — workflow_dispatch is the
        # documented exception), so hand over to update-major-tag.yml explicitly.
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ steps.release.outputs.tag_name }}
        run: gh workflow run update-major-tag.yml --ref main -f "tag=$TAG"
